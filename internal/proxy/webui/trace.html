<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Router Chain Trace</title>
  <link rel="stylesheet" href="/webui/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>

<body>
  <div class="wf">
    <div class="wf-logo">
      <span class="dot"></span>
      <span class="name">air</span>
      <div class="ver-wrapper">
        <span class="ver" id="verLabel"></span>
        <span class="commit-line" id="commitLabel"></span>
      </div>
    </div>
    <div class="wf-topbar">
      <div class="crumbs">
        <span>workspace</span>
        <span class="sep">/</span>
        <span class="here">router trace</span>
      </div>
      <div class="spacer"></div>
      <span class="pill" id="countdown"></span>
      <button class="pill" onclick="toggleTheme()">theme</button>
    </div>
    <nav class="wf-nav">
      <div class="group">workspace</div>
      <a class="item" href="/vhealth"><span class="glyph">▸</span> system health</a>
      <a class="item active" href="/vtrace"><span class="glyph">▸</span> router trace</a>
      <a class="item" href="/vconfig"><span class="glyph">▸</span> server config</a>
    </nav>
    <main class="wf-main">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:var(--sp-4);">
        <div>
          <h1 class="wf-h1">Router chain trace</h1>
          <p class="wf-sub" id="subtitle">loading…</p>
        </div>
        <div style="display:flex;gap:var(--sp-2);align-items:center;">
          <span class="wf-badge" id="statusBadge"><span class="dotS"></span><span id="statusText">—</span></span>
          <button class="wf-btn" onclick="load(true)">refresh <span class="key">R</span></button>
        </div>
      </div>

      <div class="wf-section-title">chain diagram</div>
      <div class="wf-card" style="padding:var(--sp-3);min-height:120px;overflow-x:auto;text-align:center;"
        id="diagramWrap">
        <p style="color:var(--fg-muted);padding:var(--sp-4);">Loading…</p>
      </div>

      <div class="wf-section-title">router &amp; credential data</div>
      <div id="routerList"></div>
    </main>
  </div>

  <script>
    'use strict';

    let countdownSecs = 30;
    let countdownTimer = null;

    // ── theme ──────────────────────────────────────────────────────────────────
    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      // re-render diagram with new theme
      if (window._lastTrace) renderDiagram(window._lastTrace);
    }
    (function initTheme() {
      document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
    })();

    function isDark() {
      return (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark';
    }

    // ── mermaid init ───────────────────────────────────────────────────────────
    function getMermaidConfig() {
      const dark = isDark();
      return {
        startOnLoad: false,
        theme: 'base',
        themeVariables: {
          primaryColor: dark ? '#1f2225' : '#ededeb',
          primaryTextColor: dark ? '#e7e8ea' : '#18191b',
          primaryBorderColor: dark ? '#25282c' : '#d8d8d4',
          lineColor: dark ? '#5f656d' : '#8b9098',
          background: dark ? '#131517' : '#f4f4f2',
          fontSize: '14px',
        },
        flowchart: { htmlLabels: true, curve: 'basis', nodeSpacing: 30, rankSpacing: 40 },
      };
    }

    // ── helpers ────────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '#quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function badge(cls, text) {
      return `<span class="wf-badge ${cls}"><span class="dotS"></span>${text}</span>`;
    }

    function statusClass(s) {
      return s === 'healthy' ? 'ok' : s === 'degraded' ? 'warn' : s === 'unhealthy' ? 'err' : '';
    }

    function fmtNum(n) {
      if (!n && n !== 0) return '—';
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
      if (n >= 1_000) return (n / 1_000).toFixed(0) + 'k';
      return String(n);
    }

    function fmtRate(cur, lim) {
      if (lim > 0) return `${fmtNum(cur)} / ${fmtNum(lim)}`;
      if (cur > 0) return `${fmtNum(cur)} / ∞`;
      return '—';
    }

    // ── mermaid diagram builder ────────────────────────────────────────────────
    function buildMermaid(trace) {
      const sgBlocks  = [];   // subgraph blocks (arrays of lines)
      const edgeDefs  = [];   // inter-node edges
      const animDefs  = [];   // animate declarations
      const styleDefs = [];   // style overrides
      const defined   = new Set();
      let nc = 0, ec = 0;
      const idMap = new Map();

      function nid(key) {
        if (!idMap.has(key)) idMap.set(key, 'n' + nc++);
        return idMap.get(key);
      }

      function addEdge(from, to, label) {
        const eId = 'e' + ec++;
        edgeDefs.push(label
          ? `  ${from} ${eId}@==>|"${label}"| ${to}`
          : `  ${from} ${eId}@==> ${to}`);
        if (label) animDefs.push(`  ${eId}@{ animate: true }`);
      }

      function statusFill(s) {
        return { healthy: '#22c55e', degraded: '#f59e0b', unhealthy: '#ef4444' }[s] || '#5f656d';
      }

      function sumUpstreamRPM(up) {
        if (!up || up.fetch_error) return 0;
        let total = 0;
        for (const [name, cred] of Object.entries(up.credentials || {})) {
          total += cred.type === 'proxy'
            ? sumUpstreamRPM((up.upstreams || {})[name])
            : (cred.current_rpm || 0);
        }
        return total;
      }

      function addRouter(t, alias) {
        const rid = nid('r:' + t.router_id);
        if (defined.has(rid)) return rid;
        defined.add(rid);

        const creds    = t.credentials || {};
        const nonProxy = Object.entries(creds).filter(([, c]) => c.type !== 'proxy');
        const total    = Object.keys(creds).length;
        const banned   = Object.values(creds).filter(c => c.is_banned).length;
        const dark     = isDark();

        // subgraph title = alias if set, else router_id
        const sgTitle = alias && alias !== t.router_id ? esc(alias) : esc(t.router_id);
        const sgId    = rid + 'sg';
        const sgFill  = dark ? '#1e2124' : '#f0f0ee';
        const sgStroke = statusFill(t.status);
        styleDefs.push(`  style ${sgId} fill:${sgFill},stroke:${sgStroke},stroke-width:2px`);

        const sg = [`  subgraph ${sgId} ["🖥 ${sgTitle}"]`];

        // router node (processes shape = stacked rectangle)
        const routerLbl = `${esc(t.router_id)}<br/>${esc(t.status || '?')} · ${total - banned}/${total} ok`;
        sg.push(`    ${rid}@{ shape: processes, label: "${routerLbl}" }`);
        styleDefs.push(`  style ${rid} fill:${statusFill(t.status)},color:#fff,stroke:#fff`);

        // credential nodes (notch-rect = card shape)
        for (const [name, cred] of nonProxy) {
          const lid    = nid('c:' + t.router_id + ':' + name);
          const icon   = cred.is_banned ? '✗' : '✓';
          const errStr = Object.entries(cred.banned_error_counts || {}).map(([c, n]) => `${n}×${c}`).join(' ');
          const lbl    = `${icon} ${esc(name)}<br/>${esc(cred.type)}${errStr ? '<br/>' + esc(errStr) : ''}`;
          sg.push(`    ${lid}@{ shape: notch-rect, label: "${lbl}" }`);
          styleDefs.push(`  style ${lid} fill:${cred.is_banned ? '#ef4444' : '#475569'},color:#fff,stroke:none`);
        }

        sg.push(`  end`);
        sgBlocks.push(sg);

        // edges: router → credentials
        for (const [name, cred] of nonProxy) {
          const lid = nid('c:' + t.router_id + ':' + name);
          addEdge(rid, lid, cred.current_rpm > 0 ? `${fmtNum(cred.current_rpm)} rpm` : null);
        }

        // edges: router → upstream routers
        const upstreamRids = [];
        for (const [credName, up] of Object.entries(t.upstreams || {})) {
          const upRPM = sumUpstreamRPM(up);
          const label = upRPM > 0 ? `${fmtNum(upRPM)} rpm` : null;
          if (up.fetch_error) {
            const errId  = nid('err:' + t.router_id + ':' + credName);
            const errSgId = errId + 'sg';
            sgBlocks.push([
              `  subgraph ${errSgId} ["⚠ ${esc(credName)}"]`,
              `    ${errId}@{ shape: notch-rect, label: "unreachable" }`,
              `  end`,
            ]);
            styleDefs.push(`  style ${errId} fill:#5f656d,color:#fff,stroke:none`);
            styleDefs.push(`  style ${errSgId} fill:${dark ? '#1e2124' : '#f0f0ee'},stroke:#5f656d,stroke-width:2px`);
            addEdge(rid, errId, label);
            upstreamRids.push(errId);
          } else {
            const uid = addRouter(up, credName);
            addEdge(rid, uid, label);
            upstreamRids.push(uid);
          }
        }

        // Force upstream routers to render below credential level using invisible rank edges
        if (nonProxy.length > 0 && upstreamRids.length > 0) {
          const firstCredId = nid('c:' + t.router_id + ':' + nonProxy[0][0]);
          for (const uid of upstreamRids) {
            edgeDefs.push(`  ${firstCredId} ~~~ ${uid}`);
          }
        }

        return rid;
      }

      addRouter(trace, null);
      return [
        'flowchart TB',
        ...sgBlocks.flat(),
        ...edgeDefs,
        ...animDefs,
        ...styleDefs,
      ].join('\n');
    }

    async function renderDiagram(trace) {
      const wrap = document.getElementById('diagramWrap');
      mermaid.initialize(getMermaidConfig());
      const diagram = buildMermaid(trace);
      try {
        const id = 'trace_' + Date.now();
        const { svg } = await mermaid.render(id, diagram);
        wrap.innerHTML = svg;
        const svgEl = wrap.querySelector('svg');
        if (svgEl && svgEl.getAttribute('viewBox')) {
          svgEl.removeAttribute('width');
          svgEl.removeAttribute('height');
          svgEl.style.width = '100%';
          svgEl.style.height = 'auto';
        }
      } catch (e) {
        wrap.innerHTML = `<pre style="color:var(--status-err);font-size:11px;text-align:left;">${esc(e.message)}\n\n${esc(diagram)}</pre>`;
      }
    }

    // ── router details (collapsible) ───────────────────────────────────────────
    function buildDetails(trace) {
      const routers = [];

      function collect(t, via) {
        routers.push({ t, via });
        for (const [credName, up] of Object.entries(t.upstreams || {})) {
          if (!up.fetch_error) collect(up, credName);
        }
      }
      collect(trace, null);

      return routers.map(({ t, via }, idx) => {
        const cls = statusClass(t.status);
        const credCount = Object.keys(t.credentials || {}).length;
        const viaHtml = via
          ? `<span style="color:var(--fg-dim);font-size:11px;">via ${esc(via)}</span>`
          : '';

        const rows = Object.entries(t.credentials || {}).sort().map(([name, c]) => {
          const sCls = c.is_banned ? 'err' : 'ok';
          const sTxt = c.is_banned ? 'banned' : 'ok';
          const errs = Object.entries(c.banned_error_counts || {})
            .map(([code, n]) => `${n}×${code}`).join(' ');
          return `<tr>
        <td>${esc(name)}</td>
        <td class="dim">${esc(c.type || '—')}</td>
        <td>${badge(sCls, sTxt)}</td>
        <td class="muted">${fmtRate(c.current_rpm, c.limit_rpm)}</td>
        <td class="muted">${fmtRate(c.current_tpm, c.limit_tpm)}</td>
        <td style="font-size:11px;color:var(--status-err);">${esc(errs) || '—'}</td>
      </tr>`;
        }).join('');

        const unreachRows = Object.entries(t.upstreams || {})
          .filter(([, up]) => up.fetch_error)
          .map(([credName, up]) => `<tr>
        <td>${esc(credName)}</td>
        <td class="dim">proxy</td>
        <td colspan="3" style="color:var(--status-err);font-size:11px;font-style:italic;">
          unreachable: ${esc(up.fetch_error)}
        </td>
        <td>—</td>
      </tr>`).join('');

        const openAttr = idx === 0 ? ' open' : '';
        return `<details class="wf-card" style="margin-bottom:var(--sp-2);"${openAttr}>
      <summary>
        <span style="color:var(--fg-dim);">${idx === 0 ? '▾' : '▸'}</span>
        <span style="font-size:13px;">${esc(t.router_id || '—')}</span>
        ${badge(cls, t.status || 'unknown')}
        ${viaHtml}
        <span style="margin-left:auto;color:var(--fg-dim);font-size:11px;">${credCount} credentials</span>
      </summary>
      <div class="detail-body">
        <table class="wf-table">
          <thead>
            <tr>
              <th>credential</th>
              <th>type</th>
              <th>status</th>
              <th>RPM</th>
              <th>TPM</th>
              <th>errors</th>
            </tr>
          </thead>
          <tbody>${rows}${unreachRows}</tbody>
        </table>
      </div>
    </details>`;
      }).join('');
    }

    // ── data loading ───────────────────────────────────────────────────────────
    async function load() {
      clearInterval(countdownTimer);

      try {
        const resp = await fetch('/trace');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const trace = await resp.json();
        window._lastTrace = trace;

        // version from header (added by router)
        const ver = resp.headers.get('X-Router-Version') || '';
        const commit = resp.headers.get('X-Router-Commit') || '';
        document.getElementById('verLabel').textContent =
          ver ? `${ver}` : '';
        document.getElementById('commitLabel').textContent =
          commit ? `${commit ? commit.slice(0, 7) : ''}` : '';

        // overall status derived from root router
        const rootStatus = trace.status || 'unknown';
        const cls = statusClass(rootStatus);
        const badgeEl = document.getElementById('statusBadge');
        badgeEl.className = `wf-badge ${cls}`;
        document.getElementById('statusText').textContent = rootStatus;

        // count routers + creds
        let routerCount = 0, credCount = 0;
        function countNodes(t) {
          routerCount++;
          credCount += Object.keys(t.credentials || {}).length;
          for (const up of Object.values(t.upstreams || {})) {
            if (!up.fetch_error) countNodes(up);
          }
        }
        countNodes(trace);

        document.getElementById('subtitle').textContent =
          `${routerCount} router${routerCount !== 1 ? 's' : ''} · ${credCount} credentials · updated ${new Date().toLocaleTimeString()}`;

        await renderDiagram(trace);
        document.getElementById('routerList').innerHTML = buildDetails(trace);

        // wire <details> toggle arrows
        document.querySelectorAll('#routerList details').forEach(det => {
          det.addEventListener('toggle', () => {
            const arrow = det.querySelector('summary > span:first-child');
            if (arrow) arrow.textContent = det.open ? '▾' : '▸';
          });
        });
      } catch (e) {
        document.getElementById('diagramWrap').innerHTML =
          `<p style="color:var(--status-err);padding:var(--sp-4);">Failed to load trace: ${esc(e.message)}</p>`;
        document.getElementById('routerList').innerHTML = '';
        document.getElementById('subtitle').textContent = `error: ${e.message}`;
      }

      // countdown
      countdownSecs = 30;
      tickCountdown();
      countdownTimer = setInterval(() => {
        countdownSecs--;
        tickCountdown();
        if (countdownSecs <= 0) { clearInterval(countdownTimer); load(); }
      }, 1000);
    }

    function tickCountdown() {
      document.getElementById('countdown').textContent = `refresh in ${countdownSecs}s`;
    }

    document.addEventListener('keydown', e => {
      if ((e.key === 'r' || e.key === 'R') && !e.ctrlKey && !e.metaKey) load();
    });

    load();
  </script>
</body>

</html>
