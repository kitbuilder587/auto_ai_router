[project]
site_name = "Auto AI Router"
site_description = "High-performance AI proxy router with load balancing"
site_url = "https://mixaill76.github.io/auto_ai_router/"
repo_url = "https://github.com/MiXaiLL76/auto_ai_router"
repo_name = "MiXaiLL76/auto_ai_router"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Configuration" = "getting-started/configuration.md" },
    { "API Usage" = "getting-started/api.md" },
  ]},
  { "Providers" = [
    { "Overview" = "providers/index.md" },
    { "OpenAI" = "providers/openai.md" },
    { "Anthropic" = "providers/anthropic.md" },
    { "AWS Bedrock" = "providers/bedrock.md" },
    { "Vertex AI" = "providers/vertex.md" },
    { "Gemini AI Studio" = "providers/gemini.md" },
    { "Proxy" = "providers/proxy.md" },
  ]},
  { "Monitoring" = [
    { "Prometheus" = "monitoring/prometheus.md" },
    { "OpenTelemetry" = "monitoring/otel.md" },
    { "Health Endpoints" = "monitoring/health.md" },
    { "Router Chain Trace" = "monitoring/trace.md" },
    { "Grafana" = "monitoring/grafana.md" },
  ]},
  { "LiteLLM Integration" = [
    { "LiteLLM Database" = "litellm-integration/litellm_db.md" },
    { "Model Pricing" = "litellm-integration/pricing.md" },
    { "LiteLLM Auth" = "litellm-integration/litellm_auth.md" },
    { "Kafka Spend Log" = "litellm-integration/kafka_spend_log.md" },
    { "Spend Log Operations" = "spend-log/operations.md" },
  ]},
  { "CLI Integration" = [
    {"Codex" = "cli-tools/codex.md"},
  ]},
  { "Advanced" = [
    { "Security" = "advanced/security.md" },
    { "Load Balancing" = "advanced/balancing.md" },
    { "Session-Sticky Routing" = "advanced/session_sticky.md" },
    { "Responses API" = "advanced/responses.md" },
    { "Redis / Valkey" = "advanced/redis.md" },
    { "Model Aliases" = "advanced/model_alias.md" },
    { "Troubleshooting" = "advanced/troubleshooting.md" },
  ]},
  { "API Reference [WIP]" = [
    { "Overview" = "refs/index.md" },
    { "Anthropic Messages API" = "refs/anthropic_messages_api.md" },
    { "AWS Bedrock Anthropic" = "refs/bedrock_anthropic.md" },
    { "OpenAI Chat Completions" = "refs/openai_chat_completions.md" },
    { "OpenAI Responses API" = "refs/openai_responses_api.md" },
    { "Vertex Gemini API" = "refs/vertex_gemini_api.md" },
  ]},
]

[project.theme]
palette = [
  { scheme = "default", primary = "indigo", accent = "indigo", toggle = { icon = "material/brightness-7", name = "Switch to dark mode" } },
  { scheme = "slate", primary = "indigo", accent = "indigo", toggle = { icon = "material/brightness-4", name = "Switch to light mode" } },
]
features = [
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "content.code.copy",
  "search.highlight",
]
logo = "logo.svg"

# Markdown extensions
[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.tables]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]
